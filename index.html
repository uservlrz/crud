<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <style>
        .concluida { text-decoration: line-through; color: #adb5bd; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand">Tarefas</span>
        </div>
    </nav>

    <div class="container">
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">Nova Tarefa</div>
            <div class="card-body">
                <form id="form-tarefa">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-10">
                            <label class="form-label">Descrição</label>
                            <input type="text" id="txt-tarefa" class="form-control" placeholder="O que precisa ser feito?" required/>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">Adicionar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white">Lista de Atividades</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 50px">Status</th>
                                <th>Descrição</th>
                                <th class="text-end" style="width: 180px">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="main.mjs"></script>
</body>
</html>
